[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "zenux-sdk"
version = "0.1.0"
description = "Python SDK for ingesting findings and traces into Zenux"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
dependencies = [
    "requests>=2.32",
]

[project.urls]
Homepage = "https://security.example.com"
Repository = "https://github.com/ZenuxLabs/zenux"

[tool.hatch.build.targets.wheel]
packages = ["src/zenux"]

[tool.hatch.build.targets.sdist]
include = ["src/", "README.md"]
